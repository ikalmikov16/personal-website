<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="lt-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#0c0d14"/>
    </linearGradient>
    <linearGradient id="lt-gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <linearGradient id="lt-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3c50"/>
      <stop offset="100%" stop-color="#1a1b24"/>
    </linearGradient>
    <filter id="lt-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lt-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer shape -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#lt-edge)" filter="url(#lt-shadow)"/>
  <rect x="10" y="10" width="108" height="108" rx="22" fill="url(#lt-bg)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    <line x1="10" y1="32" x2="118" y2="32"/><line x1="10" y1="54" x2="118" y2="54"/>
    <line x1="10" y1="76" x2="118" y2="76"/><line x1="10" y1="98" x2="118" y2="98"/>
    <line x1="32" y1="10" x2="32" y2="118"/><line x1="54" y1="10" x2="54" y2="118"/>
    <line x1="76" y1="10" x2="76" y2="118"/><line x1="98" y1="10" x2="98" y2="118"/>
  </g>

  <!-- Mosaic tiles (scattered, some glowing) -->
  <g filter="url(#lt-glow)">
    <!-- Accent blue cluster -->
    <rect x="34" y="34" width="18" height="18" rx="3" fill="#4a9eff" opacity="0.95"/>
    <rect x="56" y="34" width="18" height="18" rx="3" fill="#6ab0ff" opacity="0.7"/>
    <rect x="34" y="56" width="18" height="18" rx="3" fill="#3b82f6" opacity="0.6"/>

    <!-- Warm accent -->
    <rect x="78" y="56" width="18" height="18" rx="3" fill="#f97316" opacity="0.9"/>
    <rect x="78" y="78" width="18" height="18" rx="3" fill="#fbbf24" opacity="0.75"/>

    <!-- Green/teal -->
    <rect x="56" y="78" width="18" height="18" rx="3" fill="#22c55e" opacity="0.8"/>
    <rect x="34" y="78" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.55"/>

    <!-- Purple/indigo -->
    <rect x="78" y="34" width="18" height="18" rx="3" fill="#a855f7" opacity="0.8"/>
    <rect x="56" y="56" width="18" height="18" rx="3" fill="#6366f1" opacity="0.85"/>

    <!-- Edge tiles (partially visible, fading) -->
    <rect x="12" y="34" width="18" height="18" rx="3" fill="#4a9eff" opacity="0.2"/>
    <rect x="12" y="56" width="18" height="18" rx="3" fill="#f43f5e" opacity="0.25"/>
    <rect x="100" y="34" width="16" height="18" rx="3" fill="#22c55e" opacity="0.15"/>
    <rect x="100" y="56" width="16" height="18" rx="3" fill="#fbbf24" opacity="0.2"/>
    <rect x="34" y="12" width="18" height="18" rx="3" fill="#a855f7" opacity="0.15"/>
    <rect x="56" y="12" width="18" height="18" rx="3" fill="#f43f5e" opacity="0.2"/>
    <rect x="78" y="12" width="18" height="18" rx="3" fill="#4a9eff" opacity="0.12"/>
    <rect x="34" y="100" width="18" height="16" rx="3" fill="#fbbf24" opacity="0.2"/>
    <rect x="56" y="100" width="18" height="16" rx="3" fill="#6366f1" opacity="0.15"/>
    <rect x="78" y="100" width="18" height="16" rx="3" fill="#f97316" opacity="0.18"/>
    <rect x="100" y="78" width="16" height="18" rx="3" fill="#a855f7" opacity="0.12"/>
    <rect x="12" y="78" width="18" height="18" rx="3" fill="#22c55e" opacity="0.15"/>
  </g>

  <!-- Cursor/selection indicator on center tile -->
  <rect x="54.5" y="54.5" width="21" height="21" rx="3.5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>

  <!-- Gloss -->
  <rect x="10" y="10" width="108" height="108" rx="22" fill="url(#lt-gloss)"/>
</svg>
